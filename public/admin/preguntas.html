<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gestionar Preguntas</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="sidebar">
<div class="brand"><h2>&#9881; Admin</h2><small>Panel de control</small></div>
<nav>
<a href="/admin/dashboard.html"><span class="icon">&#128200;</span><span>Dashboard</span></a>
<a href="/admin/usuarios.html"><span class="icon">&#128100;</span><span>Usuarios</span></a>
<a href="/admin/preguntas.html" class="active"><span class="icon">&#128196;</span><span>Preguntas</span></a>
<a href="/admin/cuestionarios.html"><span class="icon">&#128221;</span><span>Cuestionarios</span></a>
<a href="/admin/materias.html"><span class="icon">&#128218;</span><span>Materias</span></a>
<a href="/admin/informes.html"><span class="icon">&#128202;</span><span>Informes</span></a>
</nav>
<div class="user-info"><span id="userName"></span><a onclick="logout()">Salir</a></div>
</div>
<div class="main-content">
<div class="page-header"><h1>Gestionar Preguntas</h1><button class="btn btn-primary" onclick="openModal()">+ Nueva Pregunta</button></div>
<div style="margin-bottom:16px">
<label style="font-weight:600;margin-right:8px">Filtrar por materia:</label>
<select id="filtroMateria" onchange="load()" style="padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px">
<option value="">Todas las materias</option>
</select>
</div>
<div class="table-container">
<table><thead><tr><th>ID</th><th>Pregunta</th><th>Materia</th><th>Imagen</th><th>Correcta</th><th>Acciones</th></tr></thead>
<tbody id="tablaPreguntas"></tbody></table>
</div>
</div>
<div class="modal-overlay" id="modal">
<div class="modal" style="max-width:600px">
<button class="close" onclick="closeModal()">&times;</button>
<h2 id="modalTitle">Nueva Pregunta</h2>
<form id="preguntaForm" enctype="multipart/form-data">
<input type="hidden" id="editId">
<div class="form-group"><label>Materia</label><select id="fMateria" required><option value="">Seleccione materia...</option></select></div>
<div class="form-group"><label>Texto de lectura (opcional - para preguntas de Lectura Crítica)</label><textarea id="fTextoLectura" rows="4" placeholder="Pegar aquí el texto de lectura que será compartido entre varias preguntas..."></textarea></div>
<div class="form-group"><label>Texto de la pregunta</label><textarea id="fTexto" rows="3" required></textarea></div>
<div class="form-group"><label>Imagen (opcional)</label>
<div class="drop-zone" id="dropZone" tabindex="0"><div class="icon">&#128247;</div><p>Arrastra, pega (Ctrl+V) o haz clic para seleccionar</p><p style="font-size:11px">JPG, PNG, GIF, WebP (max 5MB)</p></div>
<input type="file" id="fImagen" accept="image/*" style="display:none">
<div style="position:relative;display:inline-block">
<img id="previewImg" class="preview-img">
<button type="button" id="btnRemoveImg" onclick="removeImage()" style="display:none;position:absolute;top:-8px;right:-8px;background:#dc2626;color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px;line-height:1" title="Quitar imagen">&times;</button>
</div>
</div>
<div class="form-group" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px">
<label>Opcion A</label>
<div style="display:flex;gap:8px;align-items:center">
<input type="text" id="fOpcA" style="flex:1" placeholder="Texto de la opcion">
<label style="font-size:11px;white-space:nowrap;cursor:pointer;color:#2563eb;margin:0">
<input type="file" id="fImgA" accept="image/*" style="display:none" onchange="previewOpcion('A')">
&#128247; Imagen
</label>
</div>
<img id="previewImgA" class="preview-img" style="margin-top:8px">
<button type="button" id="btnRemoveImgA" onclick="removeImgOpcion('A')" style="display:none;margin-top:4px;padding:4px 8px;background:#dc2626;color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer">Quitar imagen</button>
</div>
<div class="form-group" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px">
<label>Opcion B</label>
<div style="display:flex;gap:8px;align-items:center">
<input type="text" id="fOpcB" style="flex:1" placeholder="Texto de la opcion">
<label style="font-size:11px;white-space:nowrap;cursor:pointer;color:#2563eb;margin:0">
<input type="file" id="fImgB" accept="image/*" style="display:none" onchange="previewOpcion('B')">
&#128247; Imagen
</label>
</div>
<img id="previewImgB" class="preview-img" style="margin-top:8px">
<button type="button" id="btnRemoveImgB" onclick="removeImgOpcion('B')" style="display:none;margin-top:4px;padding:4px 8px;background:#dc2626;color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer">Quitar imagen</button>
</div>
<div class="form-group" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px">
<label>Opcion C</label>
<div style="display:flex;gap:8px;align-items:center">
<input type="text" id="fOpcC" style="flex:1" placeholder="Texto de la opcion">
<label style="font-size:11px;white-space:nowrap;cursor:pointer;color:#2563eb;margin:0">
<input type="file" id="fImgC" accept="image/*" style="display:none" onchange="previewOpcion('C')">
&#128247; Imagen
</label>
</div>
<img id="previewImgC" class="preview-img" style="margin-top:8px">
<button type="button" id="btnRemoveImgC" onclick="removeImgOpcion('C')" style="display:none;margin-top:4px;padding:4px 8px;background:#dc2626;color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer">Quitar imagen</button>
</div>
<div class="form-group" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px">
<label>Opcion D</label>
<div style="display:flex;gap:8px;align-items:center">
<input type="text" id="fOpcD" style="flex:1" placeholder="Texto de la opcion">
<label style="font-size:11px;white-space:nowrap;cursor:pointer;color:#2563eb;margin:0">
<input type="file" id="fImgD" accept="image/*" style="display:none" onchange="previewOpcion('D')">
&#128247; Imagen
</label>
</div>
<img id="previewImgD" class="preview-img" style="margin-top:8px">
<button type="button" id="btnRemoveImgD" onclick="removeImgOpcion('D')" style="display:none;margin-top:4px;padding:4px 8px;background:#dc2626;color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer">Quitar imagen</button>
</div>
<div class="form-group"><label>Respuesta Correcta</label>
<select id="fCorrecta" required><option value="">Seleccione...</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select></div>
<button type="submit" class="btn btn-primary btn-block">Guardar Pregunta</button>
</form>
</div>
</div>
<script>
var editing = false, imagenActual = null, imagenPegada = null, imagenEliminada = false, materiasList = [];
var imagenesOpciones = { A: null, B: null, C: null, D: null };
var imagenesOpcionesEliminadas = { A: false, B: false, C: false, D: false };
var imagenesOpcionesExistentes = { A: null, B: null, C: null, D: null };
var imagenNuevaSeleccionada = false;

fetch('/api/sesion').then(function(r) { if (!r.ok) throw 0; return r.json(); }).then(function(d) {
  document.getElementById('userName').textContent = d.user.nombre;
  if (d.user.rol !== 'admin') window.location.href = '/';
  loadMaterias();
}).catch(function() { window.location.href = '/'; });

var dz = document.getElementById('dropZone'), fi = document.getElementById('fImagen'), pi = document.getElementById('previewImg'), btnRemove = document.getElementById('btnRemoveImg');
dz.addEventListener('click', function() { fi.click(); });
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', function() { dz.classList.remove('dragover'); });
dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('dragover'); fi.files = e.dataTransfer.files; showPreview(e.dataTransfer.files[0]); });
fi.addEventListener('change', function() { if (fi.files[0]) { imagenNuevaSeleccionada = true; showPreview(fi.files[0]); } });

document.addEventListener('paste', function(e) {
  // Solo pegar imagen si el foco esta en el drop zone o en el modal
  var active = document.activeElement;
  var isDropZone = active === dz || active.id === 'dropZone';
  var isInModal = document.getElementById('modal').classList.contains('active');
  if (!isDropZone && !isInModal) return;
  
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      var blob = items[i].getAsFile();
      var ext = blob.type.split('/')[1] || 'png';
      var file = new File([blob], 'pegada.' + ext, { type: blob.type });
      var dt = new DataTransfer();
      dt.items.add(file);
      fi.files = dt.files;
      imagenPegada = file;
      imagenNuevaSeleccionada = true;
      showPreview(file);
      e.preventDefault();
      break;
    }
  }
});

function showPreview(f) {
  var r = new FileReader();
  r.onload = function(e) { pi.src = e.target.result; pi.style.display = 'block'; btnRemove.style.display = 'block'; };
  r.readAsDataURL(f);
}

function removeImage() {
  pi.src = '';
  pi.style.display = 'none';
  btnRemove.style.display = 'none';
  fi.value = '';
  imagenPegada = null;
  imagenNuevaSeleccionada = false;
  if (editing) imagenEliminada = true;
}

function previewOpcion(letra) {
  var input = document.getElementById('fImg' + letra);
  var preview = document.getElementById('previewImg' + letra);
  var btnRemove = document.getElementById('btnRemoveImg' + letra);
  if (input.files && input.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) {
      preview.src = e.target.result;
      preview.style.display = 'block';
      btnRemove.style.display = 'inline-block';
      imagenesOpciones[letra] = input.files[0];
      if (editing) imagenesOpcionesEliminadas[letra] = false;
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function removeImgOpcion(letra) {
  var input = document.getElementById('fImg' + letra);
  var preview = document.getElementById('previewImg' + letra);
  var btnRemove = document.getElementById('btnRemoveImg' + letra);
  input.value = '';
  preview.src = '';
  preview.style.display = 'none';
  btnRemove.style.display = 'none';
  imagenesOpciones[letra] = null;
  if (editing) imagenesOpcionesEliminadas[letra] = true;
}

function loadMaterias() {
  fetch('/api/materias').then(function(r) { return r.json(); }).then(function(d) {
    materiasList = d.materias;
    var sel = document.getElementById('fMateria');
    var filtro = document.getElementById('filtroMateria');
    materiasList.forEach(function(m) {
      sel.innerHTML += '<option value="' + m.id + '">' + m.nombre + '</option>';
      filtro.innerHTML += '<option value="' + m.id + '">' + m.nombre + '</option>';
    });
    load();
  });
}

function load() {
  var filtro = document.getElementById('filtroMateria').value;
  var url = '/api/preguntas' + (filtro ? '?materia_id=' + filtro : '');
  fetch(url).then(function(r) { return r.json(); }).then(function(d) {
    var tb = document.getElementById('tablaPreguntas');
    tb.innerHTML = '';
    d.preguntas.forEach(function(p, idx) {
      var txt = p.texto.length > 60 ? p.texto.substring(0, 60).replace(/\n/g, ' ') + '...' : p.texto.replace(/\n/g, ' ');
      var img = p.imagen ? '<span style="color:#16a34a">&#10003;</span>' : '<span style="color:#94a3b8">No</span>';
      var lectura = p.texto_lectura ? '<span style="color:#2563eb;font-size:11px"> &#128214; Lectura</span>' : '';
      var materia = p.materia_nombre || 'Sin materia';
      var row = '<tr><td>' + (idx + 1) + '</td><td>' + txt + lectura + '</td><td><span class="badge badge-admin">' + materia + '</span></td><td>' + img + '</td>';
      row += '<td><strong>' + p.respuesta_correcta + '</strong></td>';
      row += '<td class="actions"><button class="btn btn-sm btn-primary" onclick="editPregunta(' + JSON.stringify(p).replace(/'/g, '&#39;').replace(/"/g, '&quot;') + ')">&#9998; Editar</button> ';
      row += '<button class="btn btn-sm btn-danger" onclick="deletePregunta(' + p.id + ')">&#128465; Eliminar</button></td></tr>';
      tb.innerHTML += row;
    });
    if (d.preguntas.length === 0) {
      tb.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:40px">No hay preguntas registradas</td></tr>';
    }
  });
}

function openModal() {
  editing = false;
  document.getElementById('modalTitle').textContent = 'Nueva Pregunta';
  document.getElementById('preguntaForm').reset();
  document.getElementById('editId').value = '';
  document.getElementById('fTextoLectura').value = '';
  imagenActual = null;
  imagenPegada = null;
  imagenEliminada = false;
  imagenNuevaSeleccionada = false;
  imagenesOpciones = { A: null, B: null, C: null, D: null };
  imagenesOpcionesEliminadas = { A: false, B: false, C: false, D: false };
  imagenesOpcionesExistentes = { A: null, B: null, C: null, D: null };
  fi.value = '';
  pi.style.display = 'none';
  pi.src = '';
  btnRemove.style.display = 'none';
  ['A','B','C','D'].forEach(function(l) {
    document.getElementById('fImg' + l).value = '';
    document.getElementById('previewImg' + l).style.display = 'none';
    document.getElementById('previewImg' + l).src = '';
    document.getElementById('btnRemoveImg' + l).style.display = 'none';
  });
  document.getElementById('modal').classList.add('active');
  setTimeout(function() { dz.focus(); }, 100);
}

function editPregunta(p) {
  editing = true;
  imagenActual = p.imagen;
  imagenPegada = null;
  imagenEliminada = false;
  imagenNuevaSeleccionada = false;
  imagenesOpciones = { A: null, B: null, C: null, D: null };
  imagenesOpcionesEliminadas = { A: false, B: false, C: false, D: false };
  imagenesOpcionesExistentes = { A: p.imagen_opcion_a || null, B: p.imagen_opcion_b || null, C: p.imagen_opcion_c || null, D: p.imagen_opcion_d || null };
  document.getElementById('modalTitle').textContent = 'Editar Pregunta';
  document.getElementById('editId').value = p.id;
  document.getElementById('fMateria').value = p.materia_id || '';
  document.getElementById('fTextoLectura').value = p.texto_lectura || '';
  document.getElementById('fTexto').value = p.texto;
  document.getElementById('fOpcA').value = p.opcion_a;
  document.getElementById('fOpcB').value = p.opcion_b;
  document.getElementById('fOpcC').value = p.opcion_c;
  document.getElementById('fOpcD').value = p.opcion_d;
  document.getElementById('fCorrecta').value = p.respuesta_correcta;
  if (p.imagen) { pi.src = p.imagen; pi.style.display = 'block'; btnRemove.style.display = 'block'; } else { pi.style.display = 'none'; pi.src = ''; btnRemove.style.display = 'none'; }
  ['A','B','C','D'].forEach(function(l) {
    var key = 'imagen_opcion_' + l.toLowerCase();
    var preview = document.getElementById('previewImg' + l);
    var btnR = document.getElementById('btnRemoveImg' + l);
    if (p[key]) { preview.src = p[key]; preview.style.display = 'block'; btnR.style.display = 'inline-block'; }
    else { preview.style.display = 'none'; preview.src = ''; btnR.style.display = 'none'; }
  });
  document.getElementById('modal').classList.add('active');
  setTimeout(function() { dz.focus(); }, 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.getElementById('preguntaForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var fd = new FormData();
  fd.append('texto', document.getElementById('fTexto').value);
  fd.append('opcion_a', document.getElementById('fOpcA').value);
  fd.append('opcion_b', document.getElementById('fOpcB').value);
  fd.append('opcion_c', document.getElementById('fOpcC').value);
  fd.append('opcion_d', document.getElementById('fOpcD').value);
  fd.append('respuesta_correcta', document.getElementById('fCorrecta').value);
  fd.append('materia_id', document.getElementById('fMateria').value);
  fd.append('texto_lectura', document.getElementById('fTextoLectura').value);
  // Solo enviar imagen si se selecciono una nueva imagen o si es edicion con imagen existente
  if (imagenNuevaSeleccionada && fi.files[0]) {
    fd.append('imagen', fi.files[0]);
  } else if (editing) {
    if (imagenEliminada) {
      fd.append('imagen_existente', '');
    } else if (imagenActual) {
      fd.append('imagen_existente', imagenActual);
    }
  }
  ['A','B','C','D'].forEach(function(l) {
    var key = 'imagen_opcion_' + l.toLowerCase();
    if (imagenesOpciones[l]) {
      fd.append('imagen_opcion_' + l.toLowerCase(), imagenesOpciones[l]);
    } else if (editing) {
      if (imagenesOpcionesEliminadas[l]) {
        fd.append(key + '_existente', '');
      } else if (imagenesOpcionesExistentes[l]) {
        fd.append(key + '_existente', imagenesOpcionesExistentes[l]);
      }
    }
  });

  var id = document.getElementById('editId').value;
  if (editing) { await fetch('/api/preguntas/' + id, { method: 'PUT', body: fd }); }
  else { await fetch('/api/preguntas', { method: 'POST', body: fd }); }
  closeModal();
  load();
});

function deletePregunta(id) {
  if (!confirm('Eliminar esta pregunta?')) return;
  fetch('/api/preguntas/' + id, { method: 'DELETE' }).then(function() { load(); });
}

function logout() { fetch('/api/logout', { method: 'POST' }).then(function() { window.location.href = '/'; }); }
</script>
</body></html>
