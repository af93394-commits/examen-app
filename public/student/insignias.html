<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mis Insignias</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
.stats-bar{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stats-bar .stat{background:#fff;border-radius:12px;padding:16px 24px;box-shadow:0 1px 3px rgba(0,0,0,.1);text-align:center;min-width:140px}
.stats-bar .stat .num{font-size:28px;font-weight:700;color:#2563eb}
.stats-bar .stat .lbl{font-size:12px;color:#64748b;margin-top:4px}
.filter-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-tab{padding:8px 16px;border:2px solid #e2e8f0;border-radius:20px;background:#fff;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;transition:all .2s}
.filter-tab:hover{border-color:#2563eb;color:#2563eb}
.filter-tab.active{background:#2563eb;color:#fff;border-color:#2563eb}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.badge-card{background:#fff;border-radius:16px;padding:20px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid #e2e8f0;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.badge-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.badge-card.earned{border-color:#2563eb;background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.badge-card.earned::after{content:'✓';position:absolute;top:8px;right:8px;background:#16a34a;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.badge-card.locked{opacity:.5;filter:grayscale(.8)}
.badge-card.locked:hover{opacity:.7;filter:grayscale(.5)}
.badge-icon{width:80px;height:80px;margin:0 auto 12px}
.badge-icon svg{width:100%;height:100%}
.badge-name{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:4px;line-height:1.3}
.badge-desc{font-size:11px;color:#64748b;line-height:1.3;min-height:30px}
.badge-rarity{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:8px;display:inline-block}
.rarity-comun{background:#f1f5f9;color:#64748b}
.rarity-raro{background:#dbeafe;color:#2563eb}
.rarity-epico{background:#ede9fe;color:#7c3aed}
.rarity-legendario{background:#fef3c7;color:#d97706}
.rarity-legendario.badge-card{border-color:#f59e0b;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:1000}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:400px;text-align:center}
.modal .close{float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#64748b}
.modal .badge-icon-lg{width:120px;height:120px;margin:0 auto 16px}
.modal .badge-icon-lg svg{width:100%;height:100%}
.modal h2{font-size:20px;margin-bottom:8px}
.modal p{color:#64748b;font-size:14px;margin-bottom:8px}
</style>
</head>
<body>
<div class="sidebar">
<div class="brand"><h2>&#128218; Estudiante</h2><small>ICFES Cuestionarios</small></div>
<nav>
<a href="/student/dashboard.html"><span class="icon">&#128200;</span><span>Inicio</span></a>
<a href="/student/estadisticas.html"><span class="icon">&#128202;</span><span>Estadísticas</span></a>
<a href="/student/resultados.html"><span class="icon">&#128220;</span><span>Mis Resultados</span></a>
<a href="/student/insignias.html" class="active"><span class="icon">&#127942;</span><span>Insignias</span></a>
</nav>
<div class="user-info"><span id="userName"></span><a onclick="logout()">Salir</a></div>
</div>
<div class="main-content">
<div class="page-header"><h1>&#127942; Mis Insignias</h1></div>

<div class="stats-bar">
<div class="stat"><div class="num" id="earnedCount">0</div><div class="lbl">Obtenidas</div></div>
<div class="stat"><div class="num" id="totalCount">0</div><div class="lbl">Disponibles</div></div>
<div class="stat"><div class="num" id="totalPoints">0</div><div class="lbl">Puntos</div></div>
<div class="stat"><div class="num" id="streakCount">0</div><div class="lbl">Racha Actual</div></div>
</div>

<div class="filter-tabs" id="filterTabs">
<div class="filter-tab active" data-cat="all">Todas</div>
<div class="filter-tab" data-cat="racha">Racha</div>
<div class="filter-tab" data-cat="volumen">Volumen</div>
<div class="filter-tab" data-cat="mastery">Dominio</div>
<div class="filter-tab" data-cat="horario">Horario</div>
<div class="filter-tab" data-cat="velocidad">Velocidad</div>
<div class="filter-tab" data-cat="especial">Especial</div>
</div>

<div class="badge-grid" id="badgeGrid"></div>
</div>

<div class="modal-overlay" id="modal">
<div class="modal">
<button class="close" onclick="closeModal()">&times;</button>
<div class="badge-icon-lg" id="modalIcon"></div>
<h2 id="modalName"></h2>
<p id="modalDesc"></p>
<p id="modalDate" style="font-size:12px;color:#94a3b8"></p>
<div id="modalRarity"></div>
</div>
</div>

<script>
var allBadges=[];

fetch('/api/sesion').then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(d){
  document.getElementById('userName').textContent=d.user.nombre;
  if(d.user.rol!=='estudiante')window.location.href='/admin/dashboard.html';
  loadData();
}).catch(function(){window.location.href='/'});

function loadData(){
  Promise.all([
    fetch('/api/insignias').then(function(r){return r.json()}),
    fetch('/api/insignias/mis').then(function(r){return r.json()}),
    fetch('/api/insignias/progreso').then(function(r){return r.json()})
  ]).then(function(results){
    allBadges=results[0].badges;
    var mis=results[1];
    var prog=results[2];
    document.getElementById('earnedCount').textContent=mis.totalObtenidas;
    document.getElementById('totalCount').textContent=mis.totalDisponibles;
    document.getElementById('totalPoints').textContent=mis.totalPuntos;
    document.getElementById('streakCount').textContent=prog.rachaActual+' días';
    renderBadges(allBadges);
  });
}

function renderBadges(badges){
  var grid=document.getElementById('badgeGrid');
  grid.innerHTML='';
  badges.forEach(function(b){
    var card=document.createElement('div');
    card.className='badge-card '+(b.otorgada?'earned':'locked')+' rarity-'+b.rareza;
    card.onclick=function(){showModal(b)};
    var svg=getBadgeSVG(b.clave);
    card.innerHTML='<div class="badge-icon">'+svg+'</div>'+
      '<div class="badge-name">'+b.nombre+'</div>'+
      '<div class="badge-desc">'+b.descripcion+'</div>'+
      '<div class="badge-rarity rarity-'+b.rareza+'">'+getRarityLabel(b.rareza)+'</div>';
    grid.appendChild(card);
  });
}

function getRarityLabel(r){
  return {comun:'Común',raro:'Raro',epico:'Épico',legendario:'Legendario'}[r]||r;
}

function showModal(b){
  var svg=getBadgeSVG(b.clave);
  document.getElementById('modalIcon').innerHTML=svg;
  document.getElementById('modalName').textContent=b.nombre;
  document.getElementById('modalDesc').textContent=b.descripcion;
  document.getElementById('modalDate').textContent=b.otorgada?'Obtenida: '+new Date(b.otorgado_en).toLocaleDateString():'No obtenida aún';
  document.getElementById('modalRarity').innerHTML='<div class="badge-rarity rarity-'+b.rareza+'">'+getRarityLabel(b.rareza)+' • '+b.puntos+' puntos</div>';
  document.getElementById('modal').classList.add('active');
}

function closeModal(){document.getElementById('modal').classList.remove('active')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});

document.querySelectorAll('.filter-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.filter-tab').forEach(function(t){t.classList.remove('active')});
    tab.classList.add('active');
    var cat=tab.dataset.cat;
    var filtered=cat==='all'?allBadges:allBadges.filter(function(b){return b.categoria===cat});
    renderBadges(filtered);
  });
});
