<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mi Dashboard</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
.pending-list{list-style:none;padding:0}
.pending-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f8fafc;border-radius:8px;margin-bottom:8px;border:1px solid #e2e8f0;transition:all .2s}
.pending-item:hover{border-color:#2563eb;background:#eff6ff}
.pending-item .info{flex:1}
.pending-item .title{font-weight:600;font-size:14px;color:#1e293b}
.pending-item .meta{font-size:12px;color:#64748b;margin-top:2px}
.pending-item .start-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600}
</style>
</head>
<body>
<div class="sidebar">
<div class="brand"><h2>&#128218; Estudiante</h2><small>ICFES Cuestionarios</small></div>
<nav>
<a href="/student/dashboard.html" class="active"><span class="icon">&#128200;</span><span>Inicio</span></a>
<a href="/student/estadisticas.html"><span class="icon">&#128202;</span><span>Estadísticas</span></a>
<a href="/student/resultados.html"><span class="icon">&#128220;</span><span>Mis Resultados</span></a>
</nav>
<div class="user-info"><span id="userName"></span><a onclick="logout()">Salir</a></div>
</div>
<div class="main-content">
<div class="page-header"><h1>Bienvenido, <span id="nombreEst"></span></h1></div>

<!-- STATS PRINCIPALES -->
<div class="stats-grid">
<div class="stat-card"><div class="stat-icon green">&#128218;</div><h3 id="sDisponibles">0</h3><p>Cuestionarios Disponibles</p></div>
<div class="stat-card"><div class="stat-icon blue">&#10003;</div><h3 id="sRealizados">0</h3><p>Cuestionarios Completados</p></div>
<div class="stat-card"><div class="stat-icon amber">&#127919;</div><h3 id="sPromedio">0%</h3><p>Promedio General</p></div>
<div class="stat-card"><div class="stat-icon red">&#9888;</div><h3 id="sPendientes">0</h3><p>Pendientes</p></div>
</div>

<!-- CUESTIONARIOS PENDIENTES -->
<div class="card">
<div class="card-header"><h3>&#128203; Cuestionarios Pendientes</h3><span class="badge badge-admin" id="badgePend">0</span></div>
<ul class="pending-list" id="pendientesList"></ul>
</div>

</div>
<script>
fetch('/api/sesion').then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(d){
  document.getElementById('userName').textContent=d.user.nombre;
  document.getElementById('nombreEst').textContent=d.user.nombre;
  if(d.user.rol!=='estudiante')window.location.href='/admin/dashboard.html';
  loadStats();
  loadPendientes();
}).catch(function(){window.location.href='/'});

function loadStats(){
  fetch('/api/estudiante/progreso').then(function(r){return r.json()}).then(function(d){
    document.getElementById('sDisponibles').textContent=d.totalCuestionarios;
    document.getElementById('sRealizados').textContent=d.completados;
    document.getElementById('sPromedio').textContent=d.promedioGeneral+'%';
    document.getElementById('sPendientes').textContent='--';
  });
}

function loadPendientes(){
  fetch('/api/estudiante/pendientes').then(function(r){return r.json()}).then(function(d){
    document.getElementById('sPendientes').textContent=d.totalPendientes;
    document.getElementById('badgePend').textContent=d.totalPendientes+' pendientes';
    var list=document.getElementById('pendientesList');
    list.innerHTML='';
    if(d.pendientes.length===0){
      list.innerHTML='<div class="empty-state" style="padding:24px"><div class="icon">&#127881;</div><p>No tienes cuestionarios pendientes, muy bien!</p></div>';
      return;
    }
    d.pendientes.forEach(function(p){
      var li=document.createElement('li');
      li.className='pending-item';
      li.innerHTML='<div class="info"><div class="title">'+p.titulo+'</div><div class="meta">'+(p.materia_nombre||'Sin materia')+' &bull; '+p.total_preguntas+' preguntas &bull; '+p.tiempo_limite+' min</div></div><button class="btn btn-primary start-btn" onclick="iniciarCuestionario('+p.id+',\''+p.titulo.replace(/'/g,"\\'")+'\')">Iniciar</button>';
      list.appendChild(li);
    });
  });
}

function iniciarCuestionario(id,titulo){
  if(!confirm('Iniciar cuestionario "'+titulo+'"\nEsta seguro?'))return;
  fetch('/api/intentos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cuestionario_id:id})}).then(function(r){return r.json()}).then(function(d){
    window.location.href='/student/cuestionario.html?intento='+d.id+'&total='+d.total+'&cuestionario='+id;
  });
}

function logout(){fetch('/api/logout',{method:'POST'}).then(function(){window.location.href='/';})}
</script>
</body></html>
