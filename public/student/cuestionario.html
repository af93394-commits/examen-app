<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Realizar Cuestionario</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
.texto-lectura-box {
  background: #f0f9ff;
  border-left: 4px solid #2563eb;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
  max-height: 400px;
  overflow-y: auto;
}
.texto-lectura-box h3 {
  color: #1e40af;
  margin-bottom: 12px;
  font-size: 1.1em;
}
.texto-lectura-box p {
  white-space: pre-wrap;
  line-height: 1.7;
  color: #334155;
  margin: 0;
}
.scroll-group {
  margin-bottom: 30px;
}
.scroll-group .question-card {
  margin-bottom: 16px;
}
.preguntas-scroll {
  max-height: 500px;
  overflow-y: auto;
  padding-right: 8px;
}
.preguntas-scroll::-webkit-scrollbar {
  width: 6px;
}
.preguntas-scroll::-webkit-scrollbar-track {
  background: #f1f5f9;
  border-radius: 3px;
}
.preguntas-scroll::-webkit-scrollbar-thumb {
  background: #94a3b8;
  border-radius: 3px;
}

/* Progress bar */
.quiz-progress-bar {
  width: 100%;
  height: 8px;
  background: #e2e8f0;
  border-radius: 4px;
  margin-bottom: 16px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #2563eb, #16a34a);
  border-radius: 4px;
  transition: width 0.4s ease;
}

/* Answer counter */
.quiz-stats {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  font-size: 14px;
  font-weight: 600;
}
.quiz-stats .correct { color: #16a34a; }
.quiz-stats .incorrect { color: #dc2626; }
.quiz-stats .pending { color: #94a3b8; }
</style>
</head>
<body>
<div class="main-content" style="margin-left:0">
<div class="quiz-container">
<div class="quiz-header">
<h2 id="quizTitle">Cuestionario</h2>
<div>
<span id="quizProgress" style="margin-right:16px;font-weight:600"></span>
<div class="quiz-timer" id="quizTimer">--:--</div>
</div>
</div>
<div class="quiz-stats">
<span class="correct" id="correctCount">&#10003; 0 correctas</span>
<span class="incorrect" id="incorrectCount">&#10007; 0 incorrectas</span>
<span class="pending" id="pendingCount">&#9201; 0 pendientes</span>
</div>
<div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progressFill" style="width:0%"></div></div>
<div id="quizContent"></div>
<div style="text-align:center;margin-top:24px">
<button class="btn btn-success btn-block" id="btnFinalizar" onclick="finalizar()" style="max-width:400px;display:none">Finalizar Cuestionario</button>
</div>
</div>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var intentoId = params.get('intento');
var totalPreg = parseInt(params.get('total'));
var cuestionarioId = params.get('cuestionario');
var preguntas = [], currentIndex = 0, respuestas = {}, timerSeconds = 0, timerInterval, correctCount = 0, incorrectCount = 0;

if (!intentoId) { window.location.href = '/student/dashboard.html'; }

fetch('/api/sesion').then(function(r) { if (!r.ok) throw 0; return r.json(); }).then(function(d) {
  if (d.user.rol !== 'estudiante') { window.location.href = '/'; }
  fetch('/api/cuestionarios/' + cuestionarioId + '/preguntas').then(function(r) { return r.json(); }).then(function(d2) {
    preguntas = d2.preguntas;
    if (preguntas.length === 0) {
      document.getElementById('quizContent').innerHTML = '<div class="card empty-state"><p>No hay preguntas en este cuestionario</p></div>';
      return;
    }
    startTimer();
    renderAll();
  });
}).catch(function() { window.location.href = '/'; });

function startTimer() {
  timerInterval = setInterval(function() {
    timerSeconds++;
    var m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
    var s = (timerSeconds % 60).toString().padStart(2, '0');
    document.getElementById('quizTimer').textContent = m + ':' + s;
  }, 1000);
}

function renderAll() {
  document.getElementById('quizProgress').textContent = preguntas.length + ' preguntas';
  document.getElementById('quizTitle').textContent = 'Cuestionario';
  
  var html = '';
  var i = 0;
  
  while (i < preguntas.length) {
    var p = preguntas[i];
    
    if (p.texto_lectura_contenido) {
      // Agrupar todas las preguntas con el mismo texto de lectura
      var textoLectura = p.texto_lectura_contenido;
      var grupoPreguntas = [];
      while (i < preguntas.length && preguntas[i].texto_lectura_contenido === textoLectura) {
        grupoPreguntas.push(preguntas[i]);
        i++;
      }
      
      // Renderizar el texto de lectura una vez
      html += '<div class="scroll-group">';
      html += '<div class="texto-lectura-box"><h3>&#128214; Texto de lectura</h3><p>' + textoLectura + '</p>';
      if (p.texto_lectura_imagen) html += '<img src="' + p.texto_lectura_imagen + '" style="max-width:100%;border-radius:8px;margin-top:12px;border:1px solid #e2e8f0">';
      html += '</div>';
      
      // Renderizar todas las preguntas del grupo en scroll
      html += '<div class="preguntas-scroll">';
      grupoPreguntas.forEach(function(p, idx) {
        html += renderQuestion(p, idx);
      });
      html += '</div></div>';
    } else {
      // Pregunta sin texto de lectura - renderizar individualmente
      html += renderQuestion(p, 0);
      i++;
    }
  }
  
  document.getElementById('quizContent').innerHTML = html;
  document.getElementById('btnFinalizar').style.display = 'inline-flex';
}

function renderQuestion(p, idx) {
  var selected = respuestas[p.id] || '';
  var html = '<div class="question-card">';
  
  // Buscar el índice real de la pregunta en el array preguntas
  var realIdx = preguntas.indexOf(p);
  html += '<h3>' + (realIdx + 1) + '. ' + p.texto + '</h3>';
  
  if (p.imagen) html += '<img src="' + p.imagen + '" alt="Imagen de pregunta">';
  
  ['A', 'B', 'C', 'D'].forEach(function(opt) {
    var val = p['opcion_' + opt.toLowerCase()];
    var imgKey = 'imagen_opcion_' + opt.toLowerCase();
    var imgVal = p[imgKey];
    var sel = selected === opt ? ' selected' : '';
    html += '<div class="option' + sel + '" onclick="selectOption(' + p.id + ',\'' + opt + '\',this)">';
    html += '<input type="radio" name="p' + p.id + '" value="' + opt + '"' + (selected === opt ? ' checked' : '') + '>';
    html += '<strong>' + opt + ')</strong> ';
    if (imgVal) html += '<img src="' + imgVal + '" style="max-width:200px;max-height:100px;border-radius:4px">';
    if (val) html += '<span>' + val + '</span>';
    html += '</div>';
  });
  
  html += '</div>';
  return html;
}

function selectOption(pid, opt, el) {
  respuestas[pid] = opt;
  el.parentElement.querySelectorAll('.option').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  
  // Find the question
  var p = preguntas.find(function(q) { return q.id === pid; });
  if (p) {
    // Check if correct
    var isCorrect = opt === p.respuesta_correcta;
    
    // Update counters
    if (isCorrect) {
      correctCount++;
      el.classList.add('correct-flash');
      showDinoCelebration(el);
      showFloatingScore('+1', '#16a34a', el);
    } else {
      incorrectCount++;
      el.classList.add('incorrect-flash');
      showFloatingScore('X', '#dc2626', el);
    }
    updateStats();
  }
  
  fetch('/api/intentos/' + intentoId + '/responder', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pregunta_id: pid, respuesta: opt })
  });
}

function updateStats() {
  document.getElementById('correctCount').innerHTML = '&#10003; ' + correctCount + ' correctas';
  document.getElementById('incorrectCount').innerHTML = '&#10007; ' + incorrectCount + ' incorrectas';
  document.getElementById('pendingCount').innerHTML = '&#9201; ' + (preguntas.length - correctCount - incorrectCount) + ' pendientes';
  var pct = Math.round(((correctCount + incorrectCount) / preguntas.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function showFloatingScore(text, color, targetEl) {
  var rect = targetEl.getBoundingClientRect();
  var div = document.createElement('div');
  div.className = 'float-score';
  div.textContent = text;
  div.style.color = color;
  div.style.left = (rect.left + rect.width / 2 - 15) + 'px';
  div.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(div);
  setTimeout(function() { div.remove(); }, 1000);
}

function showDinoCelebration(targetEl) {
  if (Math.random() > 0.3) return; // 30% chance
  
  var dinos = ['&#129430;', '&#129431;', '&#128038;', '&#128036;', '&#128037;', '&#129409;'];
  var dino = dinos[Math.floor(Math.random() * dinos.length)];
  
  var rect = targetEl.getBoundingClientRect();
  var div = document.createElement('div');
  div.innerHTML = dino;
  div.style.cssText = 'position:fixed;font-size:32px;pointer-events:none;z-index:9999;animation:dinoBounce 0.8s ease-out forwards;left:' + (rect.right + 10) + 'px;top:' + (rect.top - 10) + 'px';
  document.body.appendChild(div);
  setTimeout(function() { div.remove(); }, 800);
}

function finalizar() {
  if (!confirm('¿Estás seguro de finalizar el cuestionario?')) return;
  fetch('/api/intentos/' + intentoId + '/finalizar', { method: 'PUT' })
    .then(function() { window.location.href = '/student/resultados.html?intento=' + intentoId; });
}
</script>
</body>
</html>
